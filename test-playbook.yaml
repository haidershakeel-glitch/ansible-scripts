---
- name: Ping Test
  hosts: all
  gather_facts: true

  tasks:
    - name: Ping test
      ansible.builtin.ping:
      register: ping_result

    - name: Show ping result
      ansible.builtin.debug:
        msg: "{{ ping_result }}"

    - name: Show host IP address
      ansible.builtin.debug:
        msg: "Host IP: {{ ansible_default_ipv4.address }}"

    - name: Check if oss_test user exists
      ansible.builtin.command: id oss_test
      register: user_check
      ignore_errors: true

    - name: Show oss_test status
      ansible.builtin.debug:
        msg: "{{ user_check.stdout if user_check.rc == 0 else 'oss_test does not exist on this host' }}"

    - name: Create oss_test user if it does not exist
      ansible.builtin.user:
        name: oss_test
        state: present
        password: "{{ 'Telus@123' | password_hash('sha512') }}"
      when: user_check.rc != 0
      become: true

    - name: Confirm oss_test was created
      ansible.builtin.debug:
        msg: "oss_test user created successfully"
      when: user_check.rc != 0
