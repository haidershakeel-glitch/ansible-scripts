---
- name: Password Rotation - oss_test
  hosts: all
  gather_facts: false
  become: true

  vars:
    target_user: oss_test
    current_password: "1234"
    new_password: "Telus@123"

  tasks:
    - name: Verify current password is valid
      ansible.builtin.shell: |
        echo "{{ current_password }}" | su -c "whoami" - {{ target_user }}
      register: auth_result
      ignore_errors: true
      no_log: true

    - name: Abort if authentication failed
      ansible.builtin.fail:
        msg: "Authentication failed for {{ target_user }}. Password rotation aborted."
      when: auth_result.rc != 0

    - name: Change password
      ansible.builtin.user:
        name: "{{ target_user }}"
        password: "{{ new_password | password_hash('sha512') }}"
      when: auth_result.rc == 0

    - name: Write new password to file
      ansible.builtin.copy:
        content: "{{ new_password }}"
        dest: /tmp/oss_test_new_password.txt
        mode: '0600'
      when: auth_result.rc == 0

    - name: Show result
      ansible.builtin.debug:
        msg: "Password rotation successful for {{ target_user }}. New password: {{ new_password }}"
      when: auth_result.rc == 0

    - name: Verify new password works
      ansible.builtin.shell: |
        echo "{{ new_password }}" | su -c "whoami" - {{ target_user }}
      register: verify_result
      ignore_errors: true
      no_log: true
      when: auth_result.rc == 0

    - name: Show verification result
      ansible.builtin.debug:
        msg: "{{ 'New password verified successfully' if verify_result.rc == 0 else 'New password verification failed' }}"
      when: auth_result.rc == 0
